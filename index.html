<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #333;
        }

        /* Header Animation */
        .header {
            background: linear-gradient(135deg, #4f46e5, #06b6d4);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            position: relative;
        }

        .header h1 {
            margin: 0;
            font-size: 2.5rem;
            animation: slideInDown 1s ease-out;
        }

        /* Main Container */
        .container {
            max-width: 800px;
            width: 90%;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            animation: fadeIn 1.2s ease-out;
        }

        /* Modern Text Marquee Replacement */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            margin-bottom: 25px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }

        .marquee-text {
            display: inline-block;
            font-size: 1.8rem;
            color: #1e1b4b;
            animation: smoothMarquee 15s linear infinite;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            text-align: left;
        }

        thead {
            background-color: #1e1b4b;
            color: white;
        }

        tr {
            border-bottom: 1px solid #e5e7eb;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        /* Hover animation for table rows */
        tbody tr:hover {
            background-color: #f0fdf4;
            transform: scale(1.01);
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        /* Status Badge */
        .status-badge {
            background-color: #dcfce7;
            color: #15803d;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }

        /* CSS KEYFRAMES ANIMATIONS */
        @keyframes slideInDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes smoothMarquee {
            0% {
                transform: translate3d(-100%, 0, 0);
            }
            100% {
                transform: translate3d(100%, 0, 0);
            }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Welcome to My Website Home Page</h1>
    </div>

    <div class="container">
        <div class="marquee-container">
            <div class="marquee-text">Step School System Students List</div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>101</td>
                    <td>Hafsa Rizwan</td>
                    <td>Pre9</td>
                    <td><span class="status-badge">Active</span></td>
                </tr>
                <tr>
                    <td>102</td>
                    <td>Abdul Hanan</td>
                    <td>Step6</td>
                    <td><span class="status-badge">Active</span></td>
                </tr>
                <tr>
                    <td>103</td>
                    <td>AbdulHadi</td>
                    <td>Step3</td>
                    <td><span class="status-badge">Active</span></td>
                </tr>
                <tr>
                    <td>104</td>
                    <td>Hoorain Fatima</td>
                    <td>Step2</td>
                    <td><span class="status-badge">Active</span></td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
